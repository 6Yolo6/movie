# ============================================================
# Gying Movie - Production Docker Compose
# ============================================================
# Usage:
#   1. Copy .env.example to .env and fill in values
#   2. docker compose -f docker-compose.prod.yml up -d --build
# ============================================================

services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # Uncomment for HTTPS:
      # - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
    networks:
      - gying-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      - SPRING_PROFILES_ACTIVE=prod
    volumes:
      - backend-logs:/app/logs
    restart: unless-stopped
    networks:
      - gying-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ""  # Empty = use relative URLs via nginx proxy
    restart: unless-stopped
    networks:
      - gying-net

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:-gyingredis2024}
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks:
      - gying-net

volumes:
  redis-data:
  backend-logs:

networks:
  gying-net:
    driver: bridge
