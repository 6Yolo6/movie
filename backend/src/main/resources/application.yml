server:
  port: ${SERVER_PORT:8880}

spring:
  application:
    name: gying-movie
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/gying?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:Root@123}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

minio:
  url-prefix: ${MINIO_URL_PREFIX:http://localhost:9000/gying/}

app:
  cors:
    allowed-origin: ${APP_CORS_ALLOWED_ORIGIN:http://localhost:3000}

jwt:
  secret: ${JWT_SECRET:gying-movie-dev-secret-change-me-please-32-bytes}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0